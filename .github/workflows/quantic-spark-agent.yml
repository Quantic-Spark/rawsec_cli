name: Quantic Spark Agent

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  security-fix:
    name: Auto-fix Security & Code Issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Quantic Spark Agent
        run: |
          curl -fsSL https://raw.githubusercontent.com/Quantic-Spark/QSA/main/install.sh | bash

      - name: Add agent to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Quantic Spark Agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          agent --print --force "Review the codebase for security vulnerabilities, code quality issues, and bugs. Fix any issues found. Focus on: SQL injection, XSS, hardcoded secrets, input validation, error handling, and code quality best practices. DO NOT modify any files in the .github directory."

      - name: Check for changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request with fixes
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: auto-fix security and code issues"
          title: "[Quantic Spark Agent] Security & Code Fixes"
          body: |
            ## Automated Fixes by Quantic Spark Agent

            This PR contains automated fixes for security vulnerabilities and code quality issues detected in the codebase.

            ### What was checked:
            - SQL injection and XSS vulnerabilities
            - Hardcoded secrets or credentials
            - Input validation issues
            - Error handling
            - Code quality and best practices

            Please review the changes carefully before merging.

            ---
            *Generated by [Quantic Spark Agent](https://github.com/Quantic-Spark)*
          branch: quantic-spark-agent/auto-fixes
          delete-branch: true
          labels: |
            security
            automated
